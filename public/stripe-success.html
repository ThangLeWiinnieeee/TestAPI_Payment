<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stripe Checkout - Thành công</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1/dist/axios.min.js"></script>
  <script src="/js/api-client.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
  <style>
    .result-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .result-card {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 32px;
      box-shadow: var(--shadow);
    }
    .result-mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--brand-dim);
      color: var(--brand);
      font-weight: 800;
      margin-bottom: 18px;
    }
    .result-mark img.emoji {
      width: 26px;
      height: 26px;
    }
    .result-card h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .result-card p {
      color: var(--ink2);
      margin-bottom: 18px;
    }
    .session-id {
      color: var(--muted);
      font-family: var(--mono);
      overflow-wrap: anywhere;
      margin-bottom: 22px;
    }
  </style>
</head>
<body>
  <main class="result-shell">
    <section class="result-card">
      <div class="result-mark emoji-icon">✅</div>
      <h1>Thanh toán Stripe thành công</h1>
      <p>Stripe đã xử lý giao dịch. Webhook hoặc quá trình đồng bộ sẽ cập nhật trạng thái đơn hàng trong MongoDB.</p>
      <div class="session-id" id="session-id"></div>
      <div class="session-id" id="sync-status"></div>
      <a class="btn-primary" href="/create-order.html">Tạo đơn mới</a>
    </section>
  </main>
  <script>
    const sessionId = new URLSearchParams(window.location.search).get('session_id');
    const sessionEl = document.getElementById('session-id');
    const syncEl = document.getElementById('sync-status');

    function renderEmojiIcons() {
      if (!window.twemoji) return;
      document.querySelectorAll('.emoji-icon').forEach((el) => {
        window.twemoji.parse(el, { folder: 'svg', ext: '.svg' });
      });
    }

    window.addEventListener('load', renderEmojiIcons);
    renderEmojiIcons();

    sessionEl.textContent = sessionId ? `Phiên: ${sessionId}` : '';

    if (sessionId) {
      syncEl.textContent = 'Đang đồng bộ trạng thái...';
      apiClient.post(`/stripe/sync/${encodeURIComponent(sessionId)}`)
        .then(({ data }) => {
          syncEl.textContent = `Đã đồng bộ: ${data.status}`;
        })
        .catch((err) => {
          syncEl.textContent = `Không thể đồng bộ: ${getApiErrorMessage(err, 'Lỗi không xác định')}`;
        });
    }
  </script>
</body>
</html>
